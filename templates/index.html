<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <title>Main Page</title>
</head>
<body>

    <main class="flex flex-col items-center justify-center min-h-screen px-4 space-y-6">
        <img 
            src="{{ url_for('static', filename='img/logo.png')}}" 
            alt="Description" 
            class="w-32 h-auto rounded-xl object-contain "
        >
        <h1 class="text-6xl font-bold text-gray-800">YouTube Music Listener App</h1>
        <form id="musicForm" method="post" class="w-full max-w-lg flex flex-col items-center space-y-4">
            <input id="urlInput" autocomplete="off" type="text" placeholder="Enter URL" class="w-full max-w-xl px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition duration-300 cursor-pointer">Get Music</button>
        </form>

        
        <div id="playerSection" class="hidden w-full max-w-lg">
            <audio id="audioPlayer" controls class="w-full">
                Your browser does not support the audio element.
            </audio>
        </div>


    </main>

    <script src="{{ url_for('static', filename='js/script.js')}}"></script>

</body>
</html>
